<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rond Rouge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }
        
        canvas {
            display: block;
        }
        
        #soundButton {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
        }
        
        #soundButton:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        
        #soundButton.active {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Redimensionner le canvas
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);
        
        // Position de la souris
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;
        
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        // Liste de tous les ronds
        const balls = [
            {
                x: canvas.width / 2,
                y: canvas.height / 2,
                radius: 80,
                color: '#ff4444',
                vx: 2,
                vy: 1.5,
                eyeOffsetX: 0,
                eyeOffsetY: 0,
                blinkTimer: 0,
                isBlinking: false,
                eyes: {
                    left: { x: -25, y: -10, size: 18 },
                    right: { x: 25, y: -10, size: 18 }
                }
            },
            {
                x: 200,
                y: 300,
                radius: 50,
                color: '#4488ff',
                vx: -2.5,
                vy: 2,
                eyeOffsetX: 0,
                eyeOffsetY: 0,
                blinkTimer: 100,
                isBlinking: false,
                eyes: {
                    left: { x: -15, y: -6, size: 12 },
                    right: { x: 15, y: -6, size: 12 }
                }
            },
            {
                x: 600,
                y: 250,
                radius: 60,
                color: '#44ff88',
                vx: 3,
                vy: -1.5,
                eyeOffsetX: 0,
                eyeOffsetY: 0,
                blinkTimer: 50,
                isBlinking: false,
                eyes: {
                    left: { x: -18, y: -8, size: 14 },
                    right: { x: 18, y: -8, size: 14 }
                }
            },
            {
                x: 400,
                y: 500,
                radius: 40,
                color: '#ffcc44',
                vx: -1.5,
                vy: -2.5,
                eyeOffsetX: 0,
                eyeOffsetY: 0,
                blinkTimer: 150,
                isBlinking: false,
                eyes: {
                    left: { x: -12, y: -5, size: 10 },
                    right: { x: 12, y: -5, size: 10 }
                }
            },
            {
                x: 800,
                y: 400,
                radius: 70,
                color: '#aa44ff',
                vx: 2.5,
                vy: -2,
                eyeOffsetX: 0,
                eyeOffsetY: 0,
                blinkTimer: 200,
                isBlinking: false,
                eyes: {
                    left: { x: -22, y: -9, size: 16 },
                    right: { x: 22, y: -9, size: 16 }
                }
            },
            {
                x: 150,
                y: 550,
                radius: 35,
                color: '#ff88cc',
                vx: -3,
                vy: 1,
                eyeOffsetX: 0,
                eyeOffsetY: 0,
                blinkTimer: 80,
                isBlinking: false,
                eyes: {
                    left: { x: -10, y: -4, size: 8 },
                    right: { x: 10, y: -4, size: 8 }
                }
            }
        ];
        
        // Liste des particules
        const particles = [];
        
        // Audio Context pour les sons spatiaux
        let audioContext = null;
        let masterGain = null;
        
        // Initialiser l'audio
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioContext.createGain();
                masterGain.gain.value = 0.3; // Volume global
                masterGain.connect(audioContext.destination);
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }
        
        // Créer un son de fond spatial (bruit blanc filtré)
        function createSpaceAmbience() {
            const bufferSize = audioContext.sampleRate * 2;
            const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
            const data = buffer.getChannelData(0);
            
            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * 0.5;
            }
            
            const noise = audioContext.createBufferSource();
            noise.buffer = buffer;
            noise.loop = true;
            
            const filter = audioContext.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 200;
            
            const gain = audioContext.createGain();
            gain.gain.value = 0.05;
            
            noise.connect(filter);
            filter.connect(gain);
            gain.connect(masterGain);
            noise.start();
            
            return { noise, filter, gain };
        }
        
        // Créer un son de rebond sur les murs
        function playWallBounce() {
            if (!audioContext) return;
            
            const oscillator = audioContext.createOscillator();
            const gain = audioContext.createGain();
            
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(150 + Math.random() * 100, audioContext.currentTime);
            
            gain.gain.setValueAtTime(0.1, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
            
            oscillator.connect(gain);
            gain.connect(masterGain);
            
            oscillator.start();
            oscillator.stop(audioContext.currentTime + 0.1);
        }
        
        // Créer un son de collision entre ronds
        function playCollision() {
            if (!audioContext) return;
            
            const oscillator = audioContext.createOscillator();
            const gain = audioContext.createGain();
            
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(200 + Math.random() * 150, audioContext.currentTime);
            
            gain.gain.setValueAtTime(0.15, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.15);
            
            oscillator.connect(gain);
            gain.connect(masterGain);
            
            oscillator.start();
            oscillator.stop(audioContext.currentTime + 0.15);
        }
        
        // Créer un son de missile
        function playMissile() {
            if (!audioContext) return;
            
            const oscillator = audioContext.createOscillator();
            const gain = audioContext.createGain();
            
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(400, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(100, audioContext.currentTime + 0.2);
            
            gain.gain.setValueAtTime(0.05, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
            
            oscillator.connect(gain);
            gain.connect(masterGain);
            
            oscillator.start();
            oscillator.stop(audioContext.currentTime + 0.2);
        }
        
        // Créer un son d'explosion/division
        function playExplosion() {
            if (!audioContext) return;
            
            const bufferSize = audioContext.sampleRate * 0.5;
            const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
            const data = buffer.getChannelData(0);
            
            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * 0.8;
            }
            
            const noise = audioContext.createBufferSource();
            noise.buffer = buffer;
            
            const filter = audioContext.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(800, audioContext.currentTime);
            filter.frequency.exponentialRampToValueAtTime(100, audioContext.currentTime + 0.3);
            
            const gain = audioContext.createGain();
            gain.gain.setValueAtTime(0.2, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
            
            noise.connect(filter);
            filter.connect(gain);
            gain.connect(masterGain);
            
            noise.start();
        }
        
        // Créer un son de fusée
        function playRocketSound() {
            if (!audioContext) return;
            
            const oscillator = audioContext.createOscillator();
            const gain = audioContext.createGain();
            
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(80, audioContext.currentTime);
            oscillator.frequency.linearRampToValueAtTime(120, audioContext.currentTime + 0.5);
            
            gain.gain.setValueAtTime(0.03, audioContext.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
            
            oscillator.connect(gain);
            gain.connect(masterGain);
            
            oscillator.start();
            oscillator.stop(audioContext.currentTime + 0.5);
        }
        
        // Créer un son de clignement d'yeux
        function playBlink() {
            if (!audioContext) return;
            
            const oscillator = audioContext.createOscillator();
            const gain = audioContext.createGain();
            
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(600, audioContext.currentTime);
            
            gain.gain.setValueAtTime(0.02, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.05);
            
            oscillator.connect(gain);
            gain.connect(masterGain);
            
            oscillator.start();
            oscillator.stop(audioContext.currentTime + 0.05);
        }
        
        // Créer un son de particule
        function playParticle() {
            if (!audioContext) return;
            
            const oscillator = audioContext.createOscillator();
            const gain = audioContext.createGain();
            
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(800 + Math.random() * 400, audioContext.currentTime);
            
            gain.gain.setValueAtTime(0.01, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.05);
            
            oscillator.connect(gain);
            gain.connect(masterGain);
            
            oscillator.start();
            oscillator.stop(audioContext.currentTime + 0.05);
        }
        
        // Étoiles en arrière-plan
        const stars = [];
        for (let i = 0; i < 200; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 2 + 0.5,
                alpha: Math.random(),
                twinkleSpeed: Math.random() * 0.02 + 0.01,
                twinkleDirection: 1
            });
        }
        
        // Nébuleuses
        const nebulas = [
            {
                x: canvas.width * 0.2,
                y: canvas.height * 0.3,
                radius: 400,
                color1: '#4488ff',
                color2: '#aa44ff',
                opacity: 0.15,
                speed: 0.3
            },
            {
                x: canvas.width * 0.7,
                y: canvas.height * 0.6,
                radius: 500,
                color1: '#ff4488',
                color2: '#ffcc44',
                opacity: 0.12,
                speed: 0.25
            },
            {
                x: canvas.width * 0.5,
                y: canvas.height * 0.8,
                radius: 350,
                color1: '#44ff88',
                color2: '#4488ff',
                opacity: 0.1,
                speed: 0.2
            }
        ];
        
        // Position actuelle des nébuleuses
        const nebulasPosition = nebulas.map(n => ({ x: n.x, y: n.y }));
        
        // Fusées
        const rockets = [];
        const rocketColors = ['#ffffff', '#cccccc', '#eeeeee'];
        
        // Créer des fusées
        function createRocket() {
            const side = Math.floor(Math.random() * 4); // 0: haut, 1: droite, 2: bas, 3: gauche
            let x, y;
            
            switch(side) {
                case 0: // Haut
                    x = Math.random() * canvas.width;
                    y = -50;
                    break;
                case 1: // Droite
                    x = canvas.width + 50;
                    y = Math.random() * canvas.height;
                    break;
                case 2: // Bas
                    x = Math.random() * canvas.width;
                    y = canvas.height + 50;
                    break;
                case 3: // Gauche
                    x = -50;
                    y = Math.random() * canvas.height;
                    break;
            }
            
            const angle = Math.atan2(canvas.height/2 - y, canvas.width/2 - x);
            const speed = 1 + Math.random() * 1.5;
            
            rockets.push({
                x: x,
                y: y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                radius: 15,
                color: rocketColors[Math.floor(Math.random() * rocketColors.length)],
                missileTimer: Math.random() * 200 + 100,
                missileCooldown: 120
            });
        }
        
        // Initialiser quelques fusées
        for (let i = 0; i < 3; i++) {
            createRocket();
        }
        
        // Missiles
        const missiles = [];
        
        // Créer un missile
        function createMissile(rocket) {
            missiles.push({
                x: rocket.x,
                y: rocket.y,
                vx: rocket.vx + (Math.random() - 0.5) * 2,
                vy: rocket.vy + (Math.random() - 0.5) * 2,
                radius: 4,
                color: '#ff6600',
                life: 300
            });
        }
        
        // Gérer les collisions entre les ronds
        function handleCollisions() {
            for (let i = 0; i < balls.length; i++) {
                for (let j = i + 1; j < balls.length; j++) {
                    const ball1 = balls[i];
                    const ball2 = balls[j];
                    
                    // Calculer la distance entre les deux ronds
                    const dx = ball2.x - ball1.x;
                    const dy = ball2.y - ball1.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    const minDistance = ball1.radius + ball2.radius;
                    
                    // Si collision
                    if (distance < minDistance) {
                        // Créer des particules au moment de la collision
                        for (let k = 0; k < 8; k++) {
                            particles.push({
                                x: (ball1.x + ball2.x) / 2,
                                y: (ball1.y + ball2.y) / 2,
                                vx: (Math.random() - 0.5) * 6,
                                vy: (Math.random() - 0.5) * 6,
                                radius: Math.random() * 6 + 3,
                                color: ball1.color,
                                alpha: 1,
                                decay: Math.random() * 0.03 + 0.02
                            });
                        }
                        
                        // Jouer le son de collision
                        playCollision();
                        
                        // Calculer l'angle de collision
                        const angle = Math.atan2(dy, dx);
                        const sin = Math.sin(angle);
                        const cos = Math.cos(angle);
                        
                        // Rotation des positions
                        const pos1 = { x: 0, y: 0 };
                        const pos2 = { x: dx * cos + dy * sin, y: dy * cos - dx * sin };
                        
                        // Rotation des vitesses
                        const vel1 = { x: ball1.vx * cos + ball1.vy * sin, y: ball1.vy * cos - ball1.vx * sin };
                        const vel2 = { x: ball2.vx * cos + ball2.vy * sin, y: ball2.vy * cos - ball2.vx * sin };
                        
                        // Collision élastique (conservation de la quantité de mouvement)
                        const mass1 = ball1.radius * ball1.radius; // Masse proportionnelle à l'aire
                        const mass2 = ball2.radius * ball2.radius;
                        
                        const vel1Final = ((mass1 - mass2) * vel1.x + 2 * mass2 * vel2.x) / (mass1 + mass2);
                        const vel2Final = ((mass2 - mass1) * vel2.x + 2 * mass1 * vel1.x) / (mass1 + mass2);
                        
                        vel1.x = vel1Final;
                        vel2.x = vel2Final;
                        
                        // Séparer les ronds pour éviter qu'ils se chevauchent
                        const overlap = minDistance - distance;
                        const separationX = (overlap * Math.cos(angle)) / 2;
                        const separationY = (overlap * Math.sin(angle)) / 2;
                        
                        ball1.x -= separationX;
                        ball1.y -= separationY;
                        ball2.x += separationX;
                        ball2.y += separationY;
                        
                        // Rotation inverse des vitesses
                        ball1.vx = vel1.x * cos - vel1.y * sin;
                        ball1.vy = vel1.y * cos + vel1.x * sin;
                        ball2.vx = vel2.x * cos - vel2.y * sin;
                        ball2.vy = vel2.y * cos + vel2.x * sin;
                    }
                }
            }
        }
        
        // Créer des particules
        function createParticles(ball) {
            const numParticles = 3;
            for (let i = 0; i < numParticles; i++) {
                particles.push({
                    x: ball.x + (Math.random() - 0.5) * ball.radius * 0.5,
                    y: ball.y + (Math.random() - 0.5) * ball.radius * 0.5,
                    vx: (Math.random() - 0.5) * 2,
                    vy: (Math.random() - 0.5) * 2,
                    radius: Math.random() * 4 + 2,
                    color: ball.color,
                    alpha: 1,
                    decay: Math.random() * 0.02 + 0.01
                });
            }
        }
        
        // Mettre à jour et dessiner les particules
        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                
                // Mettre à jour la position
                p.x += p.vx;
                p.y += p.vy;
                
                // Réduire l'opacité
                p.alpha -= p.decay;
                
                // Supprimer les particules invisibles
                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                } else {
                    // Dessiner la particule
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.alpha;
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
            }
        }
        
        // Dessiner les étoiles
        function drawStars() {
            stars.forEach(star => {
                // Faire scintiller les étoiles
                star.alpha += star.twinkleSpeed * star.twinkleDirection;
                if (star.alpha >= 1 || star.alpha <= 0.3) {
                    star.twinkleDirection *= -1;
                }
                
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`;
                ctx.fill();
            });
        }
        
        // Mettre à jour et dessiner les nébuleuses
        function drawNebulas() {
            nebulas.forEach((nebula, index) => {
                // Déplacer doucement les nébuleuses
                nebulasPosition[index].x += Math.sin(Date.now() * 0.001 + index) * nebula.speed;
                nebulasPosition[index].y += Math.cos(Date.now() * 0.001 + index) * nebula.speed;
                
                // Créer un dégradé radial
                const gradient = ctx.createRadialGradient(
                    nebulasPosition[index].x,
                    nebulasPosition[index].y,
                    0,
                    nebulasPosition[index].x,
                    nebulasPosition[index].y,
                    nebula.radius
                );
                
                gradient.addColorStop(0, nebula.color1);
                gradient.addColorStop(0.5, nebula.color2);
                gradient.addColorStop(1, 'transparent');
                
                ctx.globalAlpha = nebula.opacity;
                ctx.beginPath();
                ctx.arc(nebulasPosition[index].x, nebulasPosition[index].y, nebula.radius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                ctx.globalAlpha = 1;
            });
        }
        
        // Mettre à jour et dessiner les fusées
        function updateRockets() {
            for (let i = rockets.length - 1; i >= 0; i--) {
                const rocket = rockets[i];
                
                // Mettre à jour la position
                rocket.x += rocket.vx;
                rocket.y += rocket.vy;
                
                // Décrémenter le timer des missiles
                rocket.missileTimer--;
                if (rocket.missileTimer <= 0) {
                    createMissile(rocket);
                    rocket.missileTimer = rocket.missileCooldown + Math.random() * 100;
                }
                
                // Supprimer les fusées hors écran
                if (rocket.x < -100 || rocket.x > canvas.width + 100 || 
                    rocket.y < -100 || rocket.y > canvas.height + 100) {
                    rockets.splice(i, 1);
                    createRocket(); // Créer une nouvelle fusée
                } else {
                    // Dessiner la fusée
                    ctx.save();
                    ctx.translate(rocket.x, rocket.y);
                    
                    // Calculer l'angle de rotation
                    const angle = Math.atan2(rocket.vy, rocket.vx);
                    ctx.rotate(angle);
                    
                    // Corps de la fusée
                    ctx.beginPath();
                    ctx.ellipse(0, 0, 15, 8, 0, 0, Math.PI * 2);
                    ctx.fillStyle = rocket.color;
                    ctx.fill();
                    
                    // Pointe de la fusée
                    ctx.beginPath();
                    ctx.moveTo(10, -5);
                    ctx.lineTo(20, 0);
                    ctx.lineTo(10, 5);
                    ctx.fillStyle = '#ff4444';
                    ctx.fill();
                    
                    // Flamme du moteur
                    ctx.beginPath();
                    ctx.moveTo(-12, -4);
                    ctx.lineTo(-20 - Math.random() * 10, 0);
                    ctx.lineTo(-12, 4);
                    ctx.fillStyle = '#ffaa00';
                    ctx.fill();
                    
                    ctx.restore();
                }
            }
        }
        
        // Mettre à jour et dessiner les missiles
        function updateMissiles() {
            for (let i = missiles.length - 1; i >= 0; i--) {
                const missile = missiles[i];
                
                // Mettre à jour la position
                missile.x += missile.vx;
                missile.y += missile.vy;
                
                // Réduire la vie
                missile.life--;
                
                // Supprimer si vie écoulée ou hors écran
                if (missile.life <= 0 || 
                    missile.x < -50 || missile.x > canvas.width + 50 ||
                    missile.y < -50 || missile.y > canvas.height + 50) {
                    missiles.splice(i, 1);
                    continue;
                }
                
                // Dessiner le missile
                ctx.beginPath();
                ctx.arc(missile.x, missile.y, missile.radius, 0, Math.PI * 2);
                ctx.fillStyle = missile.color;
                ctx.fill();
                
                // Traînée du missile
                ctx.beginPath();
                ctx.arc(missile.x - missile.vx * 3, missile.y - missile.vy * 3, missile.radius * 0.7, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 100, 0, ${missile.life / 300})`;
                ctx.fill();
                
                // Vérifier les collisions avec les ronds
                for (let j = 0; j < balls.length; j++) {
                    const ball = balls[j];
                    const dx = missile.x - ball.x;
                    const dy = missile.y - ball.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < ball.radius + missile.radius) {
                        // Collision détectée - diviser le rond
                        divideBall(ball, missile.x, missile.y);
                        missiles.splice(i, 1);
                        break;
                    }
                }
            }
        }
        
        // Diviser un rond en deux plus petits
        function divideBall(ball, impactX, impactY) {
            // Créer 2 nouveaux ronds plus petits
            const newSize = ball.radius * 0.6;
            const newColor1 = ball.color;
            const newColor2 = adjustColor(ball.color, 20);
            
            // Position de séparation
            const dx = impactX - ball.x;
            const dy = impactY - ball.y;
            const angle = Math.atan2(dy, dx);
            
            // Premier nouveau rond
            const ball1 = {
                x: ball.x + Math.cos(angle) * ball.radius * 0.5,
                y: ball.y + Math.sin(angle) * ball.radius * 0.5,
                radius: newSize,
                color: newColor1,
                vx: ball.vx * 0.8 + Math.cos(angle) * 3,
                vy: ball.vy * 0.8 + Math.sin(angle) * 3,
                eyeOffsetX: 0,
                eyeOffsetY: 0,
                blinkTimer: ball.blinkTimer,
                isBlinking: ball.isBlinking,
                eyes: {
                    left: { x: -newSize * 0.25, y: -newSize * 0.12, size: newSize * 0.28 },
                    right: { x: newSize * 0.25, y: -newSize * 0.12, size: newSize * 0.28 }
                }
            };
            
            // Deuxième nouveau rond
            const ball2 = {
                x: ball.x - Math.cos(angle) * ball.radius * 0.5,
                y: ball.y - Math.sin(angle) * ball.radius * 0.5,
                radius: newSize,
                color: newColor2,
                vx: ball.vx * 0.8 - Math.cos(angle) * 3,
                vy: ball.vy * 0.8 - Math.sin(angle) * 3,
                eyeOffsetX: 0,
                eyeOffsetY: 0,
                blinkTimer: ball.blinkTimer + 50,
                isBlinking: ball.isBlinking,
                eyes: {
                    left: { x: -newSize * 0.25, y: -newSize * 0.12, size: newSize * 0.28 },
                    right: { x: newSize * 0.25, y: -newSize * 0.12, size: newSize * 0.28 }
                }
            };
            
            // Créer des particules d'explosion
            for (let k = 0; k < 15; k++) {
                particles.push({
                    x: ball.x,
                    y: ball.y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    radius: Math.random() * 6 + 2,
                    color: ball.color,
                    alpha: 1,
                    decay: Math.random() * 0.04 + 0.02
                });
            }
            
            // Remplacer l'ancien rond par les deux nouveaux
            const index = balls.indexOf(ball);
            balls.splice(index, 1, ball1, ball2);
        }
        
        // Fonction pour ajuster la couleur (rendre plus claire ou plus foncée)
        function adjustColor(color, amount) {
            const num = parseInt(color.replace("#", ""), 16);
            const r = Math.min(255, Math.max(0, (num >> 16) + amount));
            const g = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + amount));
            const b = Math.min(255, Math.max(0, (num & 0x0000FF) + amount));
            return "#" + (0x1000000 + r * 0x10000 + g * 0x100 + b).toString(16).slice(1);
        }
        
        // Animation
        function animate() {
            // Effacer le canvas avec un léger effet de traînée
            ctx.fillStyle = 'rgba(10, 10, 30, 0.4)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Dessiner les nébuleuses en arrière-plan
            drawNebulas();
            
            // Dessiner les étoiles
            drawStars();
            
            // Mettre à jour et dessiner les fusées
            updateRockets();
            
            // Mettre à jour et dessiner les missiles
            updateMissiles();
            
            // Mettre à jour et dessiner tous les ronds
            balls.forEach((ball, index) => {
                // Sauvegarder la position précédente pour créer des particules
                const prevX = ball.x;
                const prevY = ball.y;
                
                // Mettre à jour la position avec la vélocité
                ball.x += ball.vx;
                ball.y += ball.vy;
                
                // Créer des particules si le rond a bougé significativement
                const distance = Math.sqrt(
                    Math.pow(ball.x - prevX, 2) + Math.pow(ball.y - prevY, 2)
                );
                if (distance > 2) {
                    createParticles(ball);
                    if (Math.random() > 0.7) {
                        playParticle();
                    }
                }
                
                // Rebondir sur les murs gauche et droite
                if (ball.x - ball.radius < 0) {
                    ball.x = ball.radius;
                    ball.vx = -ball.vx;
                    createParticles(ball);
                    playWallBounce();
                }
                if (ball.x + ball.radius > canvas.width) {
                    ball.x = canvas.width - ball.radius;
                    ball.vx = -ball.vx;
                    createParticles(ball);
                    playWallBounce();
                }
                
                // Rebondir sur le haut et le bas
                if (ball.y - ball.radius < 0) {
                    ball.y = ball.radius;
                    ball.vy = -ball.vy;
                    createParticles(ball);
                    playWallBounce();
                }
                if (ball.y + ball.radius > canvas.height) {
                    ball.y = canvas.height - ball.radius;
                    ball.vy = -ball.vy;
                    createParticles(ball);
                    playWallBounce();
                }
                
                // Calculer l'offset des yeux basé sur la direction du mouvement
                const eyeAngle = Math.atan2(ball.vy, ball.vx);
                const eyeSpeed = 8;
                ball.eyeOffsetX = Math.cos(eyeAngle) * eyeSpeed;
                ball.eyeOffsetY = Math.sin(eyeAngle) * eyeSpeed;
                
                // Timer pour le clignement (décalé pour chaque rond)
                ball.blinkTimer++;
                if (ball.blinkTimer > 180 + Math.random() * 120) {
                    ball.isBlinking = true;
                    ball.blinkTimer = 0;
                    playBlink();
                }
                if (ball.blinkTimer > 10) {
                    ball.isBlinking = false;
                }
                
                // Dessiner le rond
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
                ctx.fillStyle = ball.color;
                ctx.fill();
                
                // Effet de brillance
                ctx.beginPath();
                ctx.arc(ball.x - 20, ball.y - 20, ball.radius * 0.25, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.fill();
                
                // Dessiner les yeux
                const eyeSize = ball.isBlinking ? 0 : ball.eyes.left.size;
                
                // Oeil gauche
                ctx.beginPath();
                ctx.ellipse(
                    ball.x + ball.eyes.left.x + ball.eyeOffsetX,
                    ball.y + ball.eyes.left.y + ball.eyeOffsetY,
                    eyeSize,
                    eyeSize * 0.8,
                    0,
                    0,
                    Math.PI * 2
                );
                ctx.fillStyle = 'white';
                ctx.fill();
                
                // Pupille gauche
                ctx.beginPath();
                ctx.arc(
                    ball.x + ball.eyes.left.x + ball.eyeOffsetX + 5,
                    ball.y + ball.eyes.left.y + ball.eyeOffsetY,
                    eyeSize * 0.4,
                    0,
                    Math.PI * 2
                );
                ctx.fillStyle = '#333';
                ctx.fill();
                
                // Oeil droit
                ctx.beginPath();
                ctx.ellipse(
                    ball.x + ball.eyes.right.x + ball.eyeOffsetX,
                    ball.y + ball.eyes.right.y + ball.eyeOffsetY,
                    eyeSize,
                    eyeSize * 0.8,
                    0,
                    0,
                    Math.PI * 2
                );
                ctx.fillStyle = 'white';
                ctx.fill();
                
                // Pupille droite
                ctx.beginPath();
                ctx.arc(
                    ball.x + ball.eyes.right.x + ball.eyeOffsetX + 5,
                    ball.y + ball.eyes.right.y + ball.eyeOffsetY,
                    eyeSize * 0.4,
                    0,
                    Math.PI * 2
                );
                ctx.fillStyle = '#333';
                ctx.fill();
                
                // Petit sourire
                ctx.beginPath();
                ctx.arc(ball.x, ball.y + ball.radius * 0.4, ball.radius * 0.3, 0.2, Math.PI - 0.2);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.lineWidth = 4;
                ctx.stroke();
            });
            
            // Gérer les collisions entre les ronds
            handleCollisions();
            
            // Mettre à jour et dessiner les particules
            updateParticles();
            
            requestAnimationFrame(animate);
        }
        
        animate();
    </script>
</body>
